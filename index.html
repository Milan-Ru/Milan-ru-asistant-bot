<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Admin</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --danger:#f85149; --success:#3fb950; --purple:#a371f7; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .container { max-width:640px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  h1 { font-size:1.3rem; margin:0 0 16px; }
  h2 { font-size:1.05rem; margin:0 0 12px; color:var(--accent); }
  label { display:block; font-size:0.85rem; color:var(--muted); margin-bottom:6px; margin-top:12px; }
  input, select { width:100%; padding:10px 12px; background:#0d1117; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.95rem; }
  input:focus, select:focus { outline:none; border-color:var(--accent); }
  button { padding:10px 16px; background:var(--accent); border:none; border-radius:8px; color:#0d1117; font-weight:600; font-size:0.9rem; cursor:pointer; margin-top:14px; }
  button:active { opacity:0.8; }
  button.secondary { background:var(--border); color:var(--text); }
  button.danger { background:var(--danger); color:white; }
  button.small { padding:6px 10px; font-size:0.8rem; margin-top:0; }
  .key-item { border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; }
  .key-item .title { font-weight:600; }
  .key-item .meta { font-size:0.8rem; color:var(--muted); margin:4px 0; word-break:break-all; }
  .badge { display:inline-block; font-size:0.7rem; padding:2px 8px; border-radius:999px; background:var(--success); color:#0d1117; font-weight:600; margin-left:4px; }
  .badge.off { background:var(--border); color:var(--muted); }
  .badge.image { background:var(--purple); color:white; }
  #msg { font-size:0.85rem; margin-top:10px; min-height:1.2em; }
  #msg.error { color:var(--danger); }
  #msg.success { color:var(--success); }
  .hidden { display:none; }
  .actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
  .switch { position:relative; width:44px; height:24px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; inset:0; background:var(--border); border-radius:24px; cursor:pointer; transition:0.2s; }
  .slider:before { content:""; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.2s; }
  input:checked + .slider { background:var(--success); }
  input:checked + .slider:before { transform:translateX(20px); }
  code { background:#0d1117; padding:2px 6px; border-radius:4px; font-size:0.8rem; }
</style>
</head>
<body>

<div class="container">

  <div id="loginView" class="card">
    <h1>Bot Admin Login</h1>
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Default: admin#123">
    <button onclick="doLogin()">Masuk</button>
    <div id="loginMsg"></div>
  </div>

  <div id="dashView" class="hidden">
    <div class="card">
      <h1>Bot Admin Dashboard</h1>
      <button class="secondary small" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h2>Telegram</h2>
      <div id="telegramStatus" class="meta"></div>
      <label>Bot Token</label>
      <input type="text" id="telegramToken" placeholder="Dari BotFather">
      <button onclick="saveTelegramToken()">Simpan & Aktifkan Webhook</button>
    </div>

    <div class="card">
      <h2>Discord</h2>
      <div id="discordStatus" class="meta"></div>
      <label>Application ID</label>
      <input type="text" id="discordAppId" placeholder="Dari Discord Developer Portal">
      <label>Bot Token</label>
      <input type="text" id="discordBotToken" placeholder="Bot Token">
      <label>Public Key</label>
      <input type="text" id="discordPublicKey" placeholder="Public Key">
      <button onclick="saveDiscordConfig()">Simpan & Sync Commands</button>
      <div id="discordEndpoint" class="meta" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h2>Pengaturan Umum</h2>
      <div class="toggle-row">
        <span>Izinkan user ganti model sendiri</span>
        <label class="switch">
          <input type="checkbox" id="allowSwitchToggle" onchange="saveAllowSwitch()">
          <span class="slider"></span>
        </label>
      </div>
      <label>Model Default</label>
      <select id="defaultProviderSelect" onchange="saveDefaultProvider()"></select>
    </div>

    <div class="card">
      <h2>Model AI Aktif</h2>
      <div id="apiKeysList"></div>
    </div>

    <div class="card">
      <h2>Tambah Model Baru</h2>
      <label>Provider</label>
      <select id="newProvider">
        <option value="gemini">Gemini</option>
        <option value="groq">Groq</option>
        <option value="openrouter">OpenRouter</option>
      </select>
      <label>Tipe Output</label>
      <select id="newOutputType">
        <option value="text">Teks (chat biasa)</option>
        <option value="image">Gambar</option>
      </select>
      <label>Label (tampil di /start)</label>
      <input type="text" id="newLabel" placeholder="Gemini 2.0 Flash">
      <label>Command (tanpa /)</label>
      <input type="text" id="newCommand" placeholder="gemini">
      <label>Model Name</label>
      <input type="text" id="newModel" placeholder="gemini-2.0-flash">
      <label>API Key</label>
      <input type="text" id="newApiKey" placeholder="API key dari provider">
      <button onclick="addApiKey()">Tambah Model</button>
    </div>

    <div class="card">
      <h2>Ganti Password Admin</h2>
      <label>Password Baru</label>
      <input type="password" id="newPassword" placeholder="Minimal 6 karakter">
      <button onclick="changePassword()">Ganti Password</button>
    </div>

    <div id="msg"></div>
  </div>

</div>

<script>
const API = '/.netlify/functions/index';
let token = localStorage.getItem('admin_token');
let currentConfig = null;

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type || '';
  setTimeout(() => { el.textContent = ''; }, 4000);
}

function showLoginMsg(text) {
  const el = document.getElementById('loginMsg');
  el.textContent = text;
  el.style.color = '#f85149';
  el.style.fontSize = '0.85rem';
  el.style.marginTop = '10px';
}

async function api(action, method, body) {
  const res = await fetch(`${API}?action=${action}`, {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (res.status === 401) { logout(); throw new Error('Sesi habis, login ulang'); }
  if (!res.ok) throw new Error(data.error || 'Terjadi kesalahan');
  return data;
}

async function doLogin() {
  const password = document.getElementById('loginPassword').value;
  if (!password) return showLoginMsg('Isi password dulu');
  try {
    const data = await api('login', 'POST', { password });
    token = data.token;
    localStorage.setItem('admin_token', token);
    showDashboard();
  } catch (e) { showLoginMsg(e.message); }
}

function logout() {
  localStorage.removeItem('admin_token');
  token = null;
  document.getElementById('dashView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
}

async function showDashboard() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('dashView').classList.remove('hidden');
  await loadConfig();
}

async function loadConfig() {
  try {
    const data = await api('get_config');
    currentConfig = data;
    renderConfig(data);
  } catch (e) { showMsg(e.message, 'error'); }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showMsg('Disalin ke clipboard', 'success'));
}

function renderConfig(data) {
  document.getElementById('telegramStatus').innerHTML = data.telegram_token_set
    ? `Token aktif: <code>${data.telegram_token_masked}</code>`
    : 'Belum ada token diset';

  document.getElementById('discordStatus').innerHTML = data.discord_configured
    ? `Terkonfigurasi (App ID: <code>${data.discord_app_id}</code>)`
    : 'Belum dikonfigurasi';

  document.getElementById('allowSwitchToggle').checked = !!data.allow_model_switch;

  const listEl = document.getElementById('apiKeysList');
  listEl.innerHTML = data.api_keys.length ? data.api_keys.map(k => `
    <div class="key-item">
      <div class="title">${k.label}
        <span class="badge ${k.active ? '' : 'off'}">${k.active ? 'AKTIF' : 'NONAKTIF'}</span>
        ${k.output_type === 'image' ? '<span class="badge image">GAMBAR</span>' : ''}
      </div>
      <div class="meta">/${k.command} - ${k.provider} - ${k.model_name}</div>
      <div class="meta">Key: ${k.api_key_full}</div>
      <div class="actions">
        <button class="small secondary" onclick="copyText('${k.api_key_full}')">Copy Key</button>
        <button class="small secondary" onclick="toggleApiKey('${k.id}', ${!k.active})">${k.active ? 'Nonaktifkan' : 'Aktifkan'}</button>
        <button class="small danger" onclick="deleteApiKey('${k.id}')">Hapus</button>
      </div>
    </div>
  `).join('') : '<div class="meta">Belum ada model ditambahkan</div>';

  const defSel = document.getElementById('defaultProviderSelect');
  defSel.innerHTML = '<option value="">Pilih model default</option>' + data.api_keys.map(k =>
    `<option value="${k.id}" ${k.id === data.default_provider_id ? 'selected' : ''}>${k.label}</option>`
  ).join('');

  const siteUrl = window.location.origin;
  document.getElementById('discordEndpoint').innerHTML =
    `Interactions Endpoint URL (paste di Discord Developer Portal):<br><code>${siteUrl}/.netlify/functions/index</code>`;
}

async function saveTelegramToken() {
  const val = document.getElementById('telegramToken').value.trim();
  if (!val) return showMsg('Isi token dulu', 'error');
  try {
    await api('update_telegram_token', 'POST', { token: val });
    showMsg('Token disimpan, webhook diaktifkan', 'success');
    document.getElementById('telegramToken').value = '';
    await loadConfig();
  } catch (e) { showMsg(e.message, 'error'); }
}

async function saveDiscordConfig() {
  const body = {
    app_id: document.getElementById('discordAppId').value.trim(),
    bot_token: document.getElementById('discordBotToken').value.trim(),
    public_key: document.getElementById('discordPublicKey').value.trim()
  };
  if (!body.app_id || !body.bot_token || !body.public_key) return showMsg('Semua field Discord wajib diisi', 'error');
  try {
    const result = await api('update_discord_config', 'POST', body);
    showMsg(result.sync.ok ? 'Discord tersimpan, commands di-sync' : `Tersimpan, tapi sync gagal: ${result.sync.error}`, result.sync.ok ? 'success' : 'error');
    await loadConfig();
  } catch (e) { showMsg(e.message, 'error'); }
}

async function saveAllowSwitch() {
  const allow = document.getElementById('allowSwitchToggle').checked;
  try {
    await api('set_allow_switch', 'POST', { allow });
    showMsg('Pengaturan disimpan', 'success');
  } catch (e) { showMsg(e.message, 'error'); }
}

async function saveDefaultProvider() {
  const id = document.getElementById('defaultProviderSelect').value;
  try {
    await api('set_default_provider', 'POST', { id });
    showMsg('Model default disimpan', 'success');
  } catch (e) { showMsg(e.message, 'error'); }
}

async function addApiKey() {
  const body = {
    provider: document.getElementById('newProvider').value,
    output_type: document.getElementById('newOutputType').value,
    label: document.getElementById('newLabel').value.trim(),
    command: document.getElementById('newCommand').value.trim(),
    model_name: document.getElementById('newModel').value.trim(),
    api_key: document.getElementById('newApiKey').value.trim()
  };
  if (!body.label || !body.command || !body.model_name || !body.api_key) return showMsg('Semua field wajib diisi', 'error');
  try {
    await api('add_api_key', 'POST', body);
    showMsg('Model ditambahkan', 'success');
    ['newLabel', 'newCommand', 'newModel', 'newApiKey'].forEach(id => document.getElementById(id).value = '');
    await loadConfig();
  } catch (e) { showMsg(e.message, 'error'); }
}

async function toggleApiKey(id, active) {
  try { await api('update_api_key', 'POST', { id, active }); await loadConfig(); }
  catch (e) { showMsg(e.message, 'error'); }
}

async function deleteApiKey(id) {
  if (!confirm('Hapus model ini?')) return;
  try { await api('delete_api_key', 'POST', { id }); showMsg('Model dihapus', 'success'); await loadConfig(); }
  catch (e) { showMsg(e.message, 'error'); }
}

async function changePassword() {
  const val = document.getElementById('newPassword').value;
  if (!val || val.length < 6) return showMsg('Password minimal 6 karakter', 'error');
  try {
    await api('change_password', 'POST', { new_password: val });
    showMsg('Password diganti', 'success');
    document.getElementById('newPassword').value = '';
  } catch (e) { showMsg(e.message, 'error'); }
}

if (token) showDashboard();
</script>
</body>
</html>
